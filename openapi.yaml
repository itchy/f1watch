openapi: 3.0.3
info:
  title: F1 Watch Next Session API
  version: 1.0.0
  description: Returns the next F1 session with standings snapshots and time helpers.
servers:
  - url: https://{lambda_url}
    variables:
      lambda_url:
        default: f1.itchy7.com
paths:
  /:
    get:
      summary: Get next F1 session payload
      parameters:
        - name: tz
          in: query
          required: false
          description: IANA timezone name for dow/dom fields (for example America/Los_Angeles). Takes precedence over offset.
          schema:
            type: string
            example: America/Los_Angeles
        - name: offset
          in: query
          required: false
          description: Timezone offset in hours from UTC for dow/dom fields (used when tz is not provided).
          schema:
            type: integer
            example: -7
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/NextSession'
                  - $ref: '#/components/schemas/NoUpcomingSession'
        '400':
          description: Invalid request (for example non-integer offset or invalid tz)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server/internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    NextSession:
      type: object
      required:
        - general
        - schedule
        - drivers
        - constructors
      properties:
        general:
          type: object
          required:
            - source
            - request_url
            - generated_at
            - timezone
            - refresh
          properties:
            source:
              type: string
              example: f1.itchy7.com
            request_url:
              type: string
              example: https://f1.itchy7.com/?tz=America/Los_Angeles
            generated_at:
              type: string
              format: date-time
              example: '2026-03-06T15:15:02Z'
            timezone:
              type: string
              example: America/Los_Angeles
            refresh:
              type: integer
              example: 60
        schedule:
          type: object
          required:
            - event
            - session
            - start
            - dow
            - dom
            - delta
          properties:
            event:
              type: string
              example: Melbourne
            session:
              type: string
              example: FP3
            start:
              type: string
              format: date-time
              example: '2026-03-07T01:30:00Z'
            dow:
              type: string
              example: Fri
            dom:
              type: string
              example: '6'
            delta:
              type: string
              example: 10h
        drivers:
          type: array
          items:
            type: object
            required:
              - abbr
              - first_name
              - last_name
              - car_number
              - place
            properties:
              abbr:
                type: string
                example: ln4
              first_name:
                type: string
                example: Lando
              last_name:
                type: string
                example: Norris
              car_number:
                type: string
                example: '4'
              place:
                type: string
                example: '1'
        constructors:
          type: array
          items:
            type: object
            required:
              - name
              - place
            properties:
              name:
                type: string
                example: McLaren
              place:
                type: string
                example: '1'
    NoUpcomingSession:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: No upcoming session found
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: invalid literal for int() with base 10
